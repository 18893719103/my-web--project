<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>响应式网页示例</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>我的响应式网页</h1>
            <nav class="nav">
                <a href=" " class="nav-link">首页</a >
                <a href="#about" class="nav-link">关于</a >
                <a href="#contact" class="nav-link">联系</a >
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section id="home" class="section">
                <h2>欢迎来到我的网页</h2>
                <p>这是一个响应式网页示例，适配不同设备屏幕。</p >
                <button class="btn">了解更多</button>
            </section>

            <section id="about" class="section">
                <h2>关于我</h2>
                <div class="card-container">
                    <div class="card">
                        <h3>技能</h3>
                        <p>HTML / CSS / JavaScript</p >
                    </div>
                    <div class="card">
                        <h3>爱好</h3>
                        <p>网页设计 / 前端开发</p >
                    </div>
                </div>
            </section>

            <section id="contact" class="section">
                <h2>联系我</h2>
                <form class="form">
                    <input type="text" placeholder="你的名字" class="form-input">
                    <input type="email" placeholder="你的邮箱" class="form-input">
                    <textarea placeholder="留言内容" class="form-textarea"></textarea>
                    <button type="submit" class="btn">发送</button>
                </form>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 我的响应式网页. 保留所有权利.</p >
        </div>
    </footer>
</body>
</html>
